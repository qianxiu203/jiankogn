name = "xugou-backend"
main = "src/index.ts"
compatibility_date = "2025-03-10"
compatibility_flags = ["nodejs_compat"]

# 添加定时触发器，每分钟执行一次监控检查
[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "jiankong"
database_id = "7424a727-0a78-4fa6-815b-74bb17c0ecc5"

[version_metadata]
binding = "CF_VERSION_METADATA"
